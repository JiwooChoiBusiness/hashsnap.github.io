<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HASHSNAP — Viral Score AI</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #FF2D55;
    --red-light: #fff1f4;
    --blue: #007AFF;
    --blue-light: #f0f6ff;
    --green: #34C759;
    --green-light: #f0fdf4;
    --yellow: #FF9500;
    --yellow-light: #fff8f0;
    --bg: #F5F5F7;
    --white: #ffffff;
    --text: #1d1d1f;
    --muted: #86868b;
    --border: #e5e5ea;
    --shadow: 0 2px 20px rgba(0,0,0,0.06);
    --shadow-lg: 0 8px 40px rgba(0,0,0,0.10);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Plus Jakarta Sans', sans-serif;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-weight: 800;
    font-size: 17px;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  .logo em {
    color: var(--red);
    font-style: normal;
  }

  .header-badge {
    background: var(--red-light);
    color: var(--red);
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.3px;
  }

  /* HERO */
  .hero {
    max-width: 680px;
    margin: 0 auto;
    padding: 64px 24px 48px;
    text-align: center;
  }

  .hero-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 24px;
    box-shadow: var(--shadow);
  }

  .hero-pill span {
    width: 6px;
    height: 6px;
    background: var(--green);
    border-radius: 50%;
    display: inline-block;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .hero h1 {
    font-size: clamp(36px, 6vw, 56px);
    font-weight: 600;
    line-height: 1.1;
    letter-spacing: -1px;
    margin-bottom: 16px;
    color: var(--text);
  }

  .hero h1 em {
    color: var(--red);
    font-style: normal;
    font-weight: 600;
    position: relative;
  }

  .hero p {
    font-size: 16px;
    color: var(--muted);
    line-height: 1.6;
    font-weight: 400;
  }

  /* TOOL */
  .tool-wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  /* CARD */
  .card {
    background: var(--white);
    border-radius: 20px;
    padding: 32px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }

  .card-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* PLATFORM */
  .platform-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }

  .platform-btn {
    background: var(--bg);
    border: 1.5px solid transparent;
    border-radius: 12px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 16px;
    transition: all 0.18s;
  }

  .platform-btn:hover {
    background: var(--white);
    border-color: var(--border);
    color: var(--text);
  }

  .platform-btn.active {
    background: var(--red-light);
    border-color: var(--red);
    color: var(--red);
  }

  /* FORM */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  .form-group.full { grid-column: 1 / -1; }

  label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
  }

  textarea, input, select {
    background: var(--bg);
    border: 1.5px solid transparent;
    border-radius: 12px;
    color: var(--text);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 14px;
    font-weight: 400;
    padding: 12px 14px;
    transition: all 0.18s;
    outline: none;
    resize: none;
    width: 100%;
  }

  textarea:focus, input:focus, select:focus {
    background: var(--white);
    border-color: var(--red);
    box-shadow: 0 0 0 3px rgba(255,45,85,0.08);
  }

  textarea { height: 96px; }

  input::placeholder, textarea::placeholder {
    color: #c7c7cc;
  }

  /* ANALYZE BTN */
  .analyze-btn {
    width: 100%;
    background: var(--red);
    border: none;
    border-radius: 14px;
    color: white;
    cursor: pointer;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 15px;
    font-weight: 700;
    padding: 16px;
    margin-top: 20px;
    transition: all 0.2s;
    letter-spacing: -0.2px;
    box-shadow: 0 4px 20px rgba(255,45,85,0.3);
  }

  .analyze-btn:hover {
    background: #e0002f;
    transform: translateY(-1px);
    box-shadow: 0 8px 28px rgba(255,45,85,0.35);
  }

  .analyze-btn:active { transform: translateY(0); }
  .analyze-btn:disabled {
    background: #c7c7cc;
    box-shadow: none;
    cursor: not-allowed;
    transform: none;
  }

  /* LOADING */
  .loading {
    display: none;
    background: var(--white);
    border-radius: 20px;
    padding: 48px 32px;
    text-align: center;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }

  .loading.show { display: block; }

  .loading-dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 20px;
  }

  .loading-dots span {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--red);
    animation: bounce 1.2s infinite;
    opacity: 0.3;
  }

  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: scale(1); opacity: 0.3; }
    40% { transform: scale(1.4); opacity: 1; }
  }

  .loading-bar-wrap {
    background: var(--bg);
    border-radius: 4px;
    height: 4px;
    max-width: 260px;
    margin: 0 auto 14px;
    overflow: hidden;
  }

  .loading-bar {
    background: linear-gradient(90deg, var(--red), #ff6b8a);
    height: 100%;
    width: 0%;
    border-radius: 4px;
    transition: width 0.35s ease;
  }

  .loading-text {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* RESULT */
  .result-section { display: none; }
  .result-section.show {
    display: block;
    animation: fadeUp 0.45s ease forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* SCORE CARD */
  .score-card {
    background: var(--white);
    border-radius: 20px;
    padding: 32px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    display: flex;
    gap: 32px;
    align-items: center;
  }

  .score-donut {
    position: relative;
    width: 120px;
    height: 120px;
    flex-shrink: 0;
  }

  .score-donut svg {
    transform: rotate(-90deg);
  }

  .score-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .score-number {
    font-size: 40px;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -2px;
  }

  .score-unit {
    font-size: 10px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .score-right h2 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.2px;
    margin-bottom: 8px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-radius: 20px;
    background: var(--bg);
  }

  .score-right p {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.6;
    margin-top: 4px;
  }

  /* METRICS */
  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }

  .metric-card {
    background: var(--white);
    border-radius: 16px;
    padding: 18px 14px;
    text-align: center;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }

  .metric-icon {
    font-size: 20px;
    margin-bottom: 8px;
  }

  .metric-value {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 2px;
  }

  .metric-name {
    font-size: 10px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.3px;
  }

  .metric-bar {
    background: var(--bg);
    border-radius: 4px;
    height: 3px;
    margin-top: 10px;
    overflow: hidden;
  }

  .metric-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 1s ease 0.4s;
    width: 0%;
  }

  /* IMPROVE */
  .improve-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 16px;
  }

  .improve-item {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    padding: 14px 16px;
    background: var(--bg);
    border-radius: 12px;
    transition: background 0.18s;
    border: 1.5px solid transparent;
  }

  .improve-item:hover {
    background: var(--white);
    border-color: var(--border);
  }

  .improve-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 5px;
  }

  .improve-text strong {
    display: block;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 2px;
    color: var(--text);
  }

  .improve-text span {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
  }

  /* TREND */
  .trend-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 16px;
  }

  .trend-tag {
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    transition: all 0.18s;
    cursor: default;
  }

  .trend-tag.hot {
    background: var(--red-light);
    border-color: rgba(255,45,85,0.2);
    color: var(--red);
  }

  .trend-tag.warm {
    background: #f0fdf4;
    border-color: rgba(52,199,89,0.3);
    color: #2D9E5A;
  }

  /* RESET */
  .reset-btn {
    width: 100%;
    background: transparent;
    border: 1.5px solid var(--border);
    border-radius: 14px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 14px;
    margin-top: 8px;
    transition: all 0.18s;
  }

  .reset-btn:hover {
    border-color: var(--text);
    color: var(--text);
    background: var(--white);
  }

  footer {
    border-top: 1px solid var(--border);
    padding: 20px 40px;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    background: var(--white);
  }

  footer strong { color: var(--red); }

  @media (max-width: 600px) {
    header { padding: 0 20px; }
    .hero { padding: 48px 20px 32px; }
    .tool-wrap { padding: 0 16px 60px; }
    .form-grid { grid-template-columns: 1fr; }
    .metrics-grid { grid-template-columns: repeat(2, 1fr); }
    .score-card { flex-direction: column; text-align: center; }
    .card, .score-card { padding: 24px 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo"><em>HASH</em>SNAP</div>
  <div class="header-badge">✦ Viral Score AI Beta</div>
</header>

<div class="hero">

  <h1>올리기 전에,<br>먼저 <em>확인</em>하세요</h1>
  <p>캡션 · 해시태그 · 업로드 시간 · 콘텐츠 유형을 입력하면<br>SNS 확산 점수와 맞춤 개선안을 제공합니다.</p>
</div>

<div class="tool-wrap">

  <!-- INPUT CARD -->
  <div class="card" id="inputSection">
    <div class="card-label">조건 선택</div>

    <div class="form-grid">
      <div class="form-group full">
        <label>게시물 캡션 / 본문</label>
        <textarea id="caption" placeholder="작성한 캡션을 붙여넣거나 직접 입력하세요..."></textarea>
      </div>
      <div class="form-group full">
        <label>해시태그</label>
        <input type="text" id="hashtags" placeholder="#해시태그1 #해시태그2 #해시태그3">
      </div>
      <div class="form-group">
        <label>업로드 예정 시간</label>
        <select id="uploadTime">
          <option value="">선택하세요</option>
          <option value="morning">오전 7–9시</option>
          <option value="lunch">오전 11시–오후 1시</option>
          <option value="afternoon">오후 3–5시</option>
          <option value="evening">오후 6–8시 ⭐</option>
          <option value="night">오후 9–11시</option>
          <option value="late">심야 이후</option>
        </select>
      </div>
      <div class="form-group">
        <label>콘텐츠 유형</label>
        <select id="contentType">
          <option value="">선택하세요</option>
          <option value="reel">릴스 / 숏폼 🔥</option>
          <option value="carousel">카드뉴스 / 캐러셀</option>
          <option value="photo">사진 1장</option>
          <option value="video">일반 영상</option>
          <option value="story">스토리</option>
        </select>
      </div>
      <div class="form-group">
        <label>업종 / 카테고리</label>
        <select id="category">
          <option value="">선택하세요</option>
          <option value="fashion">패션 / 뷰티</option>
          <option value="food">식품 / 음료</option>
          <option value="tech">IT / 테크</option>
          <option value="travel">여행 / 라이프스타일</option>
          <option value="entertainment">엔터 / 미디어</option>
          <option value="finance">금융 / 서비스</option>
        </select>
      </div>
      <div class="form-group">
        <label>타겟 연령대</label>
        <select id="age">
          <option value="">선택하세요</option>
          <option value="teen">10대</option>
          <option value="twenties">20대</option>
          <option value="thirties">30대</option>
          <option value="forties">40대 이상</option>
          <option value="all">전 연령</option>
        </select>
      </div>
    </div>

    <button class="analyze-btn" onclick="analyze()" id="analyzeBtn">
      바이럴 점수 분석하기
    </button>
  </div>

  <!-- LOADING -->
  <div class="loading" id="loading">
    <div class="loading-dots">
      <span></span><span></span><span></span>
    </div>
    <div class="loading-bar-wrap">
      <div class="loading-bar" id="loadingBar"></div>
    </div>
    <div class="loading-text" id="loadingText">ANALYZING...</div>
  </div>

  <!-- RESULT -->
  <div class="result-section" id="result">

    <div class="score-card">
      <div class="score-donut">
        <svg width="120" height="120" viewBox="0 0 120 120">
          <circle cx="60" cy="60" r="50" fill="none" stroke="#f5f5f7" stroke-width="10"/>
          <circle cx="60" cy="60" r="50" fill="none" stroke-width="10"
            stroke-linecap="round"
            stroke-dasharray="314"
            stroke-dashoffset="314"
            id="scoreRing"
            style="transition: stroke-dashoffset 1.4s cubic-bezier(.4,0,.2,1); stroke: var(--red)"/>
        </svg>
        <div class="score-center">
          <div class="score-number" id="scoreNum">0</div>
          <div class="score-unit">SCORE</div>
        </div>
      </div>
      <div class="score-right">
        <h2 id="scoreTitle"></h2>
        <p id="scoreDesc"></p>
      </div>
    </div>

    <div class="metrics-grid" id="metricsGrid"></div>

    <div class="card">
      <div class="card-label">개선 제안</div>
      <div class="improve-list" id="improveList"></div>
    </div>

    <div class="card">
      <div class="card-label">지금 트렌딩 해시태그</div>
      <div class="trend-tags" id="trendTags"></div>
    </div>

    <button class="reset-btn" onclick="reset()">↩ 다시 분석하기</button>
  </div>

</div>

<footer>
  <strong>HASHSNAP</strong> Viral Score AI · Prototype · Not for commercial use
</footer>

<script>
  function calcScore(caption, hashtags, uploadTime, contentType, category, age) {
    let score = 30;
    const improvements = [];

    // 캡션 분석
    const len = caption.trim().length;
    if (len === 0) {
      score -= 5;
      improvements.push({ color: '#FF2D55', title: '캡션을 작성하세요', desc: '캡션이 없으면 알고리즘 노출이 크게 줄어듭니다. 2–3문장 이상 작성을 권장합니다.' });
    } else if (len < 50) {
      score += 3;
      improvements.push({ color: '#FF9500', title: '캡션을 더 길게 써보세요', desc: '100자 이상 작성하면 체류 시간이 늘어나 알고리즘에 유리합니다.' });
    } else if (len < 200) {
      score += 10;
    } else {
      score += 14;
    }

    if (caption.includes('?') || caption.includes('어떻게') || caption.includes('어떤') || caption.includes('뭐가')) {
      score += 8;
    } else if (len > 0) {
      improvements.push({ color: '#007AFF', title: '질문을 넣어보세요', desc: '캡션에 질문 한 문장을 추가하면 댓글 참여율이 평균 3배 높아집니다.' });
    }

    // 해시태그 분석
    const tags = hashtags.trim().split(/\s+/).filter(t => t.startsWith('#'));
    if (tags.length === 0) {
      score -= 10;
      improvements.push({ color: '#FF2D55', title: '해시태그를 추가하세요', desc: '해시태그 없이는 신규 유저 도달이 거의 불가능합니다.' });
    } else if (tags.length < 5) {
      score += 5;
      improvements.push({ color: '#FF9500', title: '해시태그를 늘려보세요', desc: `현재 ${tags.length}개입니다. 최적 개수는 10–15개입니다.` });
    } else if (tags.length <= 15) {
      score += 15;
    } else {
      score += 8;
      improvements.push({ color: '#FF9500', title: '해시태그가 너무 많아요', desc: '15개 이상은 스팸으로 인식될 수 있습니다. 10–12개로 줄여보세요.' });
    }

    // 업로드 시간
    const timeBonus = { morning: 12, lunch: 20, afternoon: 10, evening: 25, night: 15, late: 3 };
    if (uploadTime && timeBonus[uploadTime]) {
      score += timeBonus[uploadTime];
      if (uploadTime !== 'evening' && uploadTime !== 'lunch') {
        improvements.push({ color: '#FF9500', title: '업로드 시간을 조정해보세요', desc: '저녁 6–8시와 점심 시간대가 플랫폼 전반적으로 참여율이 가장 높습니다.' });
      }
    } else {
      improvements.push({ color: '#FF2D55', title: '업로드 시간을 선택하세요', desc: '최적 시간대에 게시하면 알고리즘 초기 노출이 크게 달라집니다.' });
    }

    // 콘텐츠 유형
    const typeBonus = { reel: 25, carousel: 18, photo: 8, video: 14, story: 5 };
    const typeLabel = { reel: '릴스', carousel: '캐러셀', photo: '사진', video: '영상', story: '스토리' };
    if (contentType && typeBonus[contentType]) {
      score += typeBonus[contentType];
      if (contentType === 'photo') {
        improvements.push({ color: '#34C759', title: '릴스 / 숏폼 전환을 고려해보세요', desc: '사진 대비 릴스는 평균 2.3배 더 많은 노출을 만들어냅니다.' });
      } else if (contentType === 'story') {
        improvements.push({ color: '#FF9500', title: '스토리 외 형식도 병행하세요', desc: '스토리는 24시간 후 사라져 장기 노출에 불리합니다. 릴스나 캐러셀을 병행하세요.' });
      }
    } else {
      improvements.push({ color: '#FF2D55', title: '콘텐츠 유형을 선택하세요', desc: '형식에 따라 알고리즘 가중치가 크게 달라집니다.' });
    }

    // 업종별 콘텐츠 유형 궁합
    const categoryTypeBonus = {
      fashion:       { reel: 10, carousel: 8, photo: 6, video: 5, story: 4 },
      food:          { reel: 10, carousel: 6, photo: 8, video: 8, story: 5 },
      tech:          { reel: 6,  carousel: 10, photo: 4, video: 10, story: 3 },
      travel:        { reel: 10, carousel: 10, photo: 8, video: 8, story: 6 },
      entertainment: { reel: 10, carousel: 6, photo: 5, video: 10, story: 5 },
      finance:       { reel: 5,  carousel: 10, photo: 4, video: 8, story: 3 },
    };

    if (category && contentType) {
      const bonus = categoryTypeBonus[category]?.[contentType] || 5;
      score += bonus;
      if (bonus < 6) {
        const categoryLabel = { fashion: '패션/뷰티', food: '식품/음료', tech: 'IT/테크', travel: '여행', entertainment: '엔터', finance: '금융' };
        improvements.push({ color: '#007AFF', title: '업종에 맞는 콘텐츠 형식이 있어요', desc: `${categoryLabel[category]} 업종은 현재 선택한 형식보다 더 효과적인 포맷이 있습니다.` });
      }
    }

    // 타겟 연령대별 최적 시간대 조언
    const ageBestTime = { teen: 'night', twenties: 'evening', thirties: 'lunch', forties: 'morning', all: 'evening' };
    if (age && uploadTime && ageBestTime[age] !== uploadTime) {
      const ageLabel = { teen: '10대', twenties: '20대', thirties: '30대', forties: '40대 이상', all: '전 연령' };
      const timeLabel = { morning: '오전 7-9시', lunch: '점심 시간대', afternoon: '오후 3-5시', evening: '저녁 6-8시', night: '오후 9-11시', late: '심야' };
      improvements.push({ color: '#007AFF', title: '타겟 연령대 맞춤 시간대가 있어요', desc: `${ageLabel[age]} 타겟은 ${timeLabel[ageBestTime[age]]}에 활동이 가장 활발합니다.` });
    }

    if (age) score += 8;
    if (category) score += 8;

    return { score: Math.min(Math.max(score, 15), 97), improvements };
  }

  function getLevel(score) {
    if (score >= 80) return { title: '바이럴 가능성 높음', desc: '현재 설정으로 높은 확산 가능성이 예측됩니다. 지금 게시해도 좋습니다!', color: '#34C759', bg: '#f0fdf4' };
    if (score >= 60) return { title: '확산 가능성 보통', desc: '개선 포인트를 적용하면 바이럴 확률이 크게 올라갑니다.', color: '#FF9500', bg: '#fff8f0' };
    if (score >= 40) return { title: '개선이 필요해요', desc: '현재 상태로는 알고리즘 노출이 제한됩니다. 아래 제안을 확인하세요.', color: '#FF6B00', bg: '#fff4ee' };
    return { title: '확산 가능성 낮음', desc: '주요 요소들이 부족합니다. 개선 사항을 적용 후 재분석해보세요.', color: '#FF2D55', bg: '#fff1f4' };
  }

  function getTrends() {
    return [
      { tag: '#릴스', hot: true }, { tag: '#감성사진', hot: true },
      { tag: '#일상', warm: true }, { tag: '#맛집투어', warm: true },
      { tag: '#여행스타그램', warm: true }, { tag: '#뷰티', hot: true },
      { tag: '#오오티디', warm: true }, { tag: '#카페투어', warm: true },
      { tag: '#쇼츠', hot: true }, { tag: '#바이럴', hot: true },
    ];
  }

  async function analyze() {
    const caption = document.getElementById('caption').value;
    const hashtags = document.getElementById('hashtags').value;
    const uploadTime = document.getElementById('uploadTime').value;
    const contentType = document.getElementById('contentType').value;
    const category = document.getElementById('category').value;
    const age = document.getElementById('age').value;

    if (!caption.trim() && !hashtags.trim() && !uploadTime && !contentType) {
      alert('최소 한 가지 이상 입력 또는 선택해주세요.');
      return;
    }

    document.getElementById('analyzeBtn').disabled = true;
    document.getElementById('loading').classList.add('show');
    document.getElementById('result').classList.remove('show');

    const steps = [
      { pct: 20, text: 'ANALYZING CAPTION...' },
      { pct: 40, text: 'SCANNING HASHTAGS...' },
      { pct: 62, text: 'CHECKING TIMING...' },
      { pct: 82, text: 'RUNNING VIRAL MODEL...' },
      { pct: 100, text: 'GENERATING REPORT...' },
    ];

    const bar = document.getElementById('loadingBar');
    const txt = document.getElementById('loadingText');

    for (const s of steps) {
      bar.style.width = s.pct + '%';
      txt.textContent = s.text;
      await new Promise(r => setTimeout(r, 360));
    }
    await new Promise(r => setTimeout(r, 280));

    const { score, improvements } = calcScore(caption, hashtags, uploadTime, contentType, category, age);
    const level = getLevel(score);
    const trends = getTrends();

    renderResult(score, level, improvements, trends);

    document.getElementById('loading').classList.remove('show');
    document.getElementById('result').classList.add('show');
    document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function renderResult(score, level, improvements, trends) {
    // Ring
    const ring = document.getElementById('scoreRing');
    ring.style.stroke = level.color;
    setTimeout(() => {
      ring.style.strokeDashoffset = 314 - (score / 100) * 314;
    }, 80);

    // Count up
    const numEl = document.getElementById('scoreNum');
    numEl.style.color = level.color;
    let cur = 0;
    const step = score / 45;
    const timer = setInterval(() => {
      cur = Math.min(cur + step, score);
      numEl.textContent = Math.round(cur);
      if (cur >= score) clearInterval(timer);
    }, 25);

    document.getElementById('scoreTitle').textContent = level.title;
    document.getElementById('scoreTitle').style.color = level.color;
    document.getElementById('scoreTitle').style.background = level.bg;
    document.getElementById('scoreDesc').textContent = level.desc;

    // Metrics
    const base = score / 100;
    const metrics = [
      { icon: '📡', name: '도달 예측', value: Math.round(base * 92) + '%', color: '#FF2D55', fill: Math.round(base * 92) },
      { icon: '💬', name: '참여율', value: Math.round(base * 87) + '%', color: '#007AFF', fill: Math.round(base * 87) },
      { icon: '🔖', name: '저장/공유', value: Math.round(base * 78) + '%', color: '#34C759', fill: Math.round(base * 78) },
      { icon: '⚡', name: '알고리즘', value: Math.round(base * 95) + '%', color: '#FF9500', fill: Math.round(base * 95) },
    ];

    const grid = document.getElementById('metricsGrid');
    grid.innerHTML = metrics.map(m => `
      <div class="metric-card">
        <div class="metric-icon">${m.icon}</div>
        <div class="metric-value" style="color:${m.color}">${m.value}</div>
        <div class="metric-name">${m.name}</div>
        <div class="metric-bar">
          <div class="metric-bar-fill" style="background:${m.color}" data-fill="${m.fill}"></div>
        </div>
      </div>
    `).join('');

    setTimeout(() => {
      grid.querySelectorAll('.metric-bar-fill').forEach(el => {
        el.style.width = el.dataset.fill + '%';
      });
    }, 150);

    // Improvements
    const list = document.getElementById('improveList');
    if (improvements.length === 0) {
      list.innerHTML = `<div class="improve-item"><div class="improve-dot" style="background:#34C759"></div><div class="improve-text"><strong>✅ 모든 요소 최적화 완료!</strong><span>현재 설정 그대로 게시하세요.</span></div></div>`;
    } else {
      list.innerHTML = improvements.slice(0, 5).map(imp => `
        <div class="improve-item">
          <div class="improve-dot" style="background:${imp.color}"></div>
          <div class="improve-text">
            <strong>${imp.title}</strong>
            <span>${imp.desc}</span>
          </div>
        </div>
      `).join('');
    }

    // Trends
    document.getElementById('trendTags').innerHTML = trends.map(t => `
      <div class="trend-tag ${t.hot ? 'hot' : t.warm ? 'warm' : ''}">${t.tag}${t.hot ? ' 🔥' : t.warm ? ' ↑' : ''}</div>
    `).join('');
  }

  function reset() {
    document.getElementById('result').classList.remove('show');
    document.getElementById('analyzeBtn').disabled = false;
    document.getElementById('scoreRing').style.strokeDashoffset = '314';
    document.getElementById('loadingBar').style.width = '0%';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
</script>
</body>
</html>
